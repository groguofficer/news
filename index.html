<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Feed Reader</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
            color: #333;
        }
        h1 {
            color: #e05c00;
            text-align: center;
            margin-bottom: 30px;
        }
        .feeds-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        @media (max-width: 900px) {
            .feeds-grid {
                grid-template-columns: 1fr;
            }
        }
        .feed-column {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
        }
        .feed-column h2 {
            font-size: 16px;
            margin: 0 0 4px;
            padding-bottom: 10px;
            border-bottom: 3px solid #e05c00;
            color: #e05c00;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .feed-status {
            font-size: 12px;
            color: #888;
            font-style: italic;
            margin-bottom: 12px;
            min-height: 16px;
        }
        .feed-error {
            font-size: 13px;
            color: red;
        }
        .feed-item {
            border-bottom: 1px solid #eee;
            padding: 12px 0;
        }
        .feed-item:last-child {
            border-bottom: none;
        }
        .feed-item h3 {
            margin: 0 0 4px;
            font-size: 14px;
            line-height: 1.4;
        }
        .feed-item h3 a {
            color: #1a73e8;
            text-decoration: none;
        }
        .feed-item h3 a:hover {
            text-decoration: underline;
        }
        .feed-item .meta {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 6px;
        }
        .feed-item p {
            margin: 0;
            font-size: 13px;
            line-height: 1.5;
            color: #555;
        }
        .loading-spinner {
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <h1>News Feed Reader</h1>

    <div class="feeds-grid" id="feeds-grid">
        <!-- Feed columns will be injected here -->
    </div>

    <script>
        const RSS2JSON_API = "https://api.rss2json.com/v1/api.json?rss_url=";

        const feeds = [
            {
                name: "NYT World News",
                url: "https://rss.nytimes.com/services/xml/rss/nyt/World.xml"
            },
            {
                name: "Channel NewsAsia",
                url: "https://www.channelnewsasia.com/api/v1/rss-outbound-feed?_format=xml"
            },
            {
                name: "BBC News",
                url: "http://newsrss.bbc.co.uk/rss/newsonline_uk_edition/front_page/rss.xml"
            }
        ];

        function createFeedColumn(feed) {
            const col = document.createElement("div");
            col.className = "feed-column";
            col.id = `feed-${feed.name.replace(/\s+/g, "-").toLowerCase()}`;

            col.innerHTML = `
                <h2 title="${feed.name}">${feed.name}</h2>
                <div class="feed-status" id="status-${col.id}">Loading...</div>
                <div class="feed-items" id="items-${col.id}">
                    <div class="loading-spinner">Fetching articles...</div>
                </div>
            `;

            return col;
        }

        function stripHtml(html) {
            const div = document.createElement("div");
            div.innerHTML = html || "";
            return div.textContent || div.innerText || "";
        }

        async function loadFeed(feed, col) {
            const statusEl = document.getElementById(`status-${col.id}`);
            const itemsEl = document.getElementById(`items-${col.id}`);

            try {
                const response = await fetch(RSS2JSON_API + encodeURIComponent(feed.url));
                const data = await response.json();

                if (data.status !== "ok") {
                    throw new Error(data.message || "Failed to load feed.");
                }

                

                statusEl.textContent = `${data.items.length} articles loaded`;
                itemsEl.innerHTML = "";

                data.items.forEach(item => {
                    const pubDate = item.pubDate
                        ? new Date(item.pubDate).toLocaleString()
                        : "";

                    const plainText = stripHtml(item.description);
                    const snippet = plainText.substring(0, 150) + (plainText.length > 150 ? "..." : "");

                    const div = document.createElement("div");
                    div.className = "feed-item";
                    div.innerHTML = `
                        <h3><a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a></h3>
                        <div class="meta">${pubDate}${item.author ? " · " + item.author : ""}</div>
                        <p>${snippet}</p>
                    `;
                    itemsEl.appendChild(div);
                });

            } catch (err) {
                statusEl.textContent = "";
                itemsEl.innerHTML = `<div class="feed-error">Could not load feed: ${err.message}</div>`;
            }
        }

        function init() {
            const grid = document.getElementById("feeds-grid");

            feeds.forEach(feed => {
                const col = createFeedColumn(feed);
                grid.appendChild(col);
                loadFeed(feed, col);
            });
        }

        init();
    </script>

</body>
</html>
