<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsFeed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', Arial, sans-serif;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            background: linear-gradient(135deg, #fdf6ec, #f0e6d3, #e8d5b7);
            min-height: 100vh;
            color: #3c1e0a;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #f5c98a, #d4845a);
            top: -120px;
            left: -120px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #e8c49a, #c47a2b);
            bottom: -100px;
            right: -100px;
        }

        /* Header area */
        .header {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 8px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.4px;
            background: linear-gradient(90deg, #6b3f1f, #a0522d, #c47a2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Refresh button */
        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(160, 82, 45, 0.1);
            border: 1px solid rgba(160, 82, 45, 0.3);
            border-radius: 20px;
            color: #a0522d;
            font-family: 'Plus Jakarta Sans', Arial, sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
            white-space: nowrap;
        }

        .refresh-btn:hover {
            background: rgba(160, 82, 45, 0.18);
            border-color: rgba(160, 82, 45, 0.5);
            transform: translateY(-1px);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .refresh-btn svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            transition: transform 0.5s ease;
        }

        .refresh-btn.spinning svg {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Countdown bar */
        .countdown-row {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
            font-size: 11px;
            color: rgba(120, 70, 20, 0.5);
            font-style: italic;
        }

        .countdown-bar-wrap {
            width: 120px;
            height: 3px;
            background: rgba(160, 82, 45, 0.12);
            border-radius: 2px;
            overflow: hidden;
        }

        .countdown-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #a0522d, #c47a2b);
            border-radius: 2px;
            width: 100%;
            transform-origin: left;
            transition: width 1s linear;
        }

        /* Grid */
        .feeds-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        @media (max-width: 900px) {
            .feeds-grid {
                grid-template-columns: 1fr;
            }
            .header {
                flex-wrap: wrap;
            }
        }

        .feed-column {
            background: rgba(255, 248, 238, 0.65);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(180, 120, 60, 0.18);
            box-shadow:
                0 4px 24px rgba(120, 60, 10, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            transition: box-shadow 0.3s ease, transform 0.3s ease, opacity 0.3s ease;
        }

        .feed-column:hover {
            box-shadow:
                0 8px 40px rgba(180, 100, 40, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        .feed-column.refreshing {
            opacity: 0.6;
        }

        .feed-column h2 {
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 4px;
            padding-bottom: 12px;
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(90deg, #a0522d, #c47a2b) 1;
            background: linear-gradient(90deg, #6b3f1f, #a0522d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.3px;
        }

        .feed-status {
            font-size: 11px;
            color: rgba(120, 70, 20, 0.5);
            font-style: italic;
            margin-bottom: 14px;
            min-height: 16px;
        }

        .feed-error {
            font-size: 13px;
            color: #c0392b;
        }

        .feed-item {
            border-bottom: 1px solid rgba(160, 100, 40, 0.12);
            padding: 13px 0;
            transition: background 0.2s ease, padding 0.2s ease;
        }

        .feed-item:last-child {
            border-bottom: none;
        }

        .feed-item:hover {
            background: rgba(200, 140, 60, 0.07);
            border-radius: 8px;
            padding-left: 6px;
            padding-right: 6px;
        }

        .feed-item h3 {
            margin: 0 0 5px;
            font-size: 13.5px;
            font-weight: 500;
            line-height: 1.45;
        }

        .feed-item h3 a {
            color: #a0522d;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .feed-item h3 a:hover {
            color: #c47a2b;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .feed-item .meta {
            font-size: 10.5px;
            color: rgba(120, 70, 20, 0.5);
            margin-bottom: 6px;
        }

        .feed-item p {
            margin: 0;
            font-size: 12.5px;
            line-height: 1.55;
            color: rgba(60, 30, 10, 0.7);
            font-weight: 300;
        }

        .loading-spinner {
            text-align: center;
            padding: 24px;
            color: rgba(140, 80, 30, 0.5);
            font-size: 13px;
            font-style: italic;
            animation: pulse 1.6s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>NewsFeed</h1>
        <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"/>
                <path d="M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0114.36-3.36L23 10M1 14l5.09 4.36A9 9 0 0020.49 15"/>
            </svg>
            Refresh
        </button>
    </div>

    <div class="countdown-row">
        <span id="countdown-label">Next refresh in <strong id="countdown-text">5:00</strong></span>
        <div class="countdown-bar-wrap">
            <div class="countdown-bar-fill" id="countdown-bar"></div>
        </div>
    </div>

    <div class="feeds-grid" id="feeds-grid"></div>

    <script>
        const RSS2JSON_API = "https://api.rss2json.com/v1/api.json?rss_url=";
        const POLL_INTERVAL_MS = 5 * 60 * 1000; // 5 minutes

        const feeds = [
            {
                name: "Mothership",
                url: "https://mothership.sg/feed/"
            },
            {
                name: "BBC News",
                url: "http://newsrss.bbc.co.uk/rss/newsonline_uk_edition/front_page/rss.xml"
            },
            {
                name: "NYT World News",
                url: "https://rss.nytimes.com/services/xml/rss/nyt/World.xml"
            }
        ];

        let pollTimer = null;
        let countdownTimer = null;
        let nextRefreshAt = null;
        let isRefreshing = false;

        // ── DOM helpers ──────────────────────────────────────────────────────────

        function createFeedColumn(feed) {
            const col = document.createElement("div");
            col.className = "feed-column";
            col.id = `feed-${feed.name.replace(/\s+/g, "-").toLowerCase()}`;
            col.innerHTML = `
                <h2 title="${feed.name}">${feed.name}</h2>
                <div class="feed-status" id="status-${col.id}">Loading…</div>
                <div class="feed-items" id="items-${col.id}">
                    <div class="loading-spinner">Fetching articles…</div>
                </div>
            `;
            return col;
        }

        function stripHtml(html) {
            const div = document.createElement("div");
            div.innerHTML = html || "";
            return div.textContent || div.innerText || "";
        }

        function formatTime(date) {
            return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }

        // ── Feed loading ─────────────────────────────────────────────────────────

        async function loadFeed(feed, col) {
            const statusEl = document.getElementById(`status-${col.id}`);
            const itemsEl = document.getElementById(`items-${col.id}`);

            col.classList.add("refreshing");

            try {
                const response = await fetch(RSS2JSON_API + encodeURIComponent(feed.url));
                const data = await response.json();

                if (data.status !== "ok") throw new Error(data.message || "Failed to load feed.");

                const updatedAt = formatTime(new Date());
                statusEl.textContent = `${data.items.length} articles · updated ${updatedAt}`;
                itemsEl.innerHTML = "";

                data.items.forEach(item => {
                    const pubDate = item.pubDate ? new Date(item.pubDate).toLocaleString() : "";
                    const plainText = stripHtml(item.description);
                    const snippet = plainText.substring(0, 150) + (plainText.length > 150 ? "…" : "");
                    const div = document.createElement("div");
                    div.className = "feed-item";
                    div.innerHTML = `
                        <h3><a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a></h3>
                        <div class="meta">${pubDate}${item.author ? " · " + item.author : ""}</div>
                        <p>${snippet}</p>
                    `;
                    itemsEl.appendChild(div);
                });
            } catch (err) {
                statusEl.textContent = "";
                itemsEl.innerHTML = `<div class="feed-error">Could not load feed: ${err.message}</div>`;
            } finally {
                col.classList.remove("refreshing");
            }
        }

        async function refreshAllFeeds() {
            if (isRefreshing) return;
            isRefreshing = true;

            const btn = document.getElementById("refresh-btn");
            btn.disabled = true;
            btn.classList.add("spinning");

            const cols = document.querySelectorAll(".feed-column");
            const promises = feeds.map((feed, i) => loadFeed(feed, cols[i]));
            await Promise.all(promises);

            btn.disabled = false;
            btn.classList.remove("spinning");
            isRefreshing = false;

            // Reset the polling clock after every refresh (manual or auto)
            scheduleNextPoll();
        }

        // ── Polling & countdown ──────────────────────────────────────────────────

        function scheduleNextPoll() {
            clearTimeout(pollTimer);
            clearInterval(countdownTimer);

            nextRefreshAt = Date.now() + POLL_INTERVAL_MS;

            // Auto-poll
            pollTimer = setTimeout(() => {
                refreshAllFeeds();
            }, POLL_INTERVAL_MS);

            // Tick the countdown every second
            updateCountdown();
            countdownTimer = setInterval(updateCountdown, 1000);
        }

        function updateCountdown() {
            const remaining = Math.max(0, nextRefreshAt - Date.now());
            const totalSecs = Math.round(remaining / 1000);
            const mins = Math.floor(totalSecs / 60);
            const secs = totalSecs % 60;

            document.getElementById("countdown-text").textContent =
                `${mins}:${String(secs).padStart(2, "0")}`;

            // Shrink the bar left→right as time passes
            const pct = (remaining / POLL_INTERVAL_MS) * 100;
            document.getElementById("countdown-bar").style.width = `${pct}%`;
        }

        // ── Manual refresh ───────────────────────────────────────────────────────

        function manualRefresh() {
            refreshAllFeeds();
        }

        // ── Init ─────────────────────────────────────────────────────────────────

        function init() {
            const grid = document.getElementById("feeds-grid");
            feeds.forEach(feed => {
                const col = createFeedColumn(feed);
                grid.appendChild(col);
            });

            refreshAllFeeds(); // initial load (also starts the poll clock)
        }

        init();
    </script>

</body>
</html>
